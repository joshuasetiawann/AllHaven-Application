name: Build Android APK

# Builds the AllHaven mobile app into an installable .apk on GitHub's runners —
# no Android Studio or SDK needed on your machine. The .apk is attached to every
# run as a downloadable artifact and published to the "mobile-latest" pre-release.
#
# Run it: Actions tab → "Build Android APK" → Run workflow, and enter your API
# base URL only if you want a built-in Desktop Bridge default. Mobile data runs
# through Supabase; the Desktop Bridge is optional and used for Ollama/n8n.

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Backend API base URL the APK points at (e.g. https://yourdomain.com/api/v1)"
        required: false
        default: ""
  push:
    branches: [mobile]
    paths:
      - "frontend/**"
      - ".github/workflows/android-apk.yml"
  # Pushes to the dedicated mobile branch build APK artifacts automatically.
  # Manual dispatch remains available when you want to override api_base_url.

permissions:
  contents: write # needed to publish the apk to a Release

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Optional Desktop Bridge default: manual input → repo variable → empty.
      # Empty is intentional for the standalone mobile architecture; users can set
      # the Tailscale bridge URL inside the APK only when Ollama/n8n are needed.
      API_URL: ${{ github.event.inputs.api_base_url || vars.MOBILE_API_BASE_URL || '' }}
      SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || vars.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # Capacitor 8 CLI requires Node >= 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21" # Capacitor 8 / AGP compiles with source release 21

      - uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: npm ci

      - name: Validate mobile environment
        run: |
          test -n "$SUPABASE_URL" || { echo "::error::Missing repo variable SUPABASE_URL (or NEXT_PUBLIC_SUPABASE_URL). The APK would boot without mobile data."; exit 1; }
          test -n "$SUPABASE_ANON_KEY" || { echo "::error::Missing repo secret SUPABASE_ANON_KEY (or NEXT_PUBLIC_SUPABASE_ANON_KEY). The APK would boot without mobile auth/data."; exit 1; }

      - name: Build static export + sync Capacitor
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          # build:mobile sets NEXT_PUBLIC_AUTH_MODE=bearer + NEXT_PUBLIC_DATA_MODE=supabase
        run: |
          echo "Building Supabase-mode APK"
          npm run build:mobile
          npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: allhaven-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish to "mobile-latest" release (download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-latest
          name: AllHaven Mobile (latest debug build)
          prerelease: true
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            Debug APK of the AllHaven mobile app, built by CI.
            Mobile data: Supabase-direct.
            Desktop Bridge default: `${{ env.API_URL || 'none; configure in-app for Ollama/n8n' }}`
            Download `app-debug.apk` below → install on Android (enable "Install unknown apps").
