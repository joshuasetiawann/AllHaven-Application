name: Build Android APK

# Builds the AllHaven mobile app into an installable .apk on GitHub's runners —
# no Android Studio or SDK needed on your machine. The .apk is attached to every
# run as a downloadable artifact and published to the "mobile-latest" pre-release.
#
# Run it: Actions tab → "Build Android APK" → Run workflow. The default APK uses
# Supabase directly for login/data. Enter an API base URL only for the optional
# Desktop Bridge used by Ollama/n8n/backend-only tools.

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Backend API base URL the APK points at (e.g. https://yourdomain.com/api/v1)"
        required: false
        default: ""
      data_mode:
        description: "Data source for the APK: supabase = Supabase-direct, rest = Desktop Bridge backend"
        required: false
        default: "supabase"
  push:
    branches: [mobile]
    paths:
      - "frontend/**"
      - ".github/workflows/android-apk.yml"
  # Pushes to the dedicated mobile branch build APK artifacts automatically.
  # Manual dispatch remains available when you want to override api_base_url.

permissions:
  contents: write # needed to publish the apk to a Release

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Desktop Bridge default: manual input → repo variable → this desktop's
      # Tailscale IP. Raw 100.x avoids MagicDNS/system resolver problems; users
      # can still paste a Tailscale Serve HTTPS URL at runtime if DNS works.
      API_URL: ${{ github.event.inputs.api_base_url || vars.MOBILE_API_BASE_URL || 'http://100.91.122.124:8000/api/v1' }}
      DATA_MODE: ${{ github.event.inputs.data_mode || vars.MOBILE_DATA_MODE || 'supabase' }}
      SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || vars.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # Capacitor 8 CLI requires Node >= 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21" # Capacitor 8 / AGP compiles with source release 21

      - uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: npm ci

      - name: Validate mobile environment
        run: |
          case "$DATA_MODE" in
            rest)
              test -n "$API_URL" || { echo "::error::Missing API_URL. REST/Backend Bridge APK needs a backend URL."; exit 1; }
              ;;
            supabase)
              test -n "$SUPABASE_URL" || { echo "::error::Missing repo variable SUPABASE_URL (or NEXT_PUBLIC_SUPABASE_URL)."; exit 1; }
              test -n "$SUPABASE_ANON_KEY" || { echo "::error::Missing repo secret SUPABASE_ANON_KEY (or NEXT_PUBLIC_SUPABASE_ANON_KEY)."; exit 1; }
              ;;
            *)
              echo "::error::DATA_MODE must be rest or supabase, got '$DATA_MODE'"
              exit 1
              ;;
          esac

      - name: Build static export + sync Capacitor
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_AUTH_MODE: bearer
          NEXT_PUBLIC_DATA_MODE: ${{ env.DATA_MODE }}
        run: |
          echo "Building APK with DATA_MODE=$NEXT_PUBLIC_DATA_MODE and API=$NEXT_PUBLIC_API_BASE_URL"
          if [ "$NEXT_PUBLIC_DATA_MODE" = "supabase" ]; then
            npm run build:mobile:supabase
          else
            npm run build:mobile:rest
          fi
          npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: allhaven-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish to "mobile-latest" release (download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-latest
          name: AllHaven Mobile (latest debug build)
          prerelease: true
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            Debug APK of the AllHaven mobile app, built by CI.
            Mobile data mode: `${{ env.DATA_MODE }}` (`supabase` = direct login/data; `rest` = Desktop Bridge backend).
            Desktop Bridge default for backend-only tools: `${{ env.API_URL }}`
            Download `app-debug.apk` below → install on Android (enable "Install unknown apps").
