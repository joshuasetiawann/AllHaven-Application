<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" role="img" aria-label="AllHaven — fifteen AI providers and models">
  <defs>
    <style>
      .t{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;}
      .card{fill:#10151C;stroke:#1F2730;stroke-width:1.5;}
      .name{fill:#E6EAF1;font-size:18px;font-weight:700;}
      .ven{fill:#8B96A7;font-size:12px;}
    </style>
  </defs>

  <rect width="1280" height="560" fill="#0A0C10"/>
  <circle cx="1170" cy="40" r="220" fill="#18E0D6" opacity="0.05"/>

  <text class="t" x="40" y="64" font-size="30" font-weight="700" fill="#E6EAF1">🤖 Fifteen AI providers, one command center</text>
  <text class="t" x="40" y="100" font-size="16" fill="#8B96A7">Run up to <tspan fill="#18E0D6" font-weight="700">10 agents concurrently</tspan> — Parallel, Debate, or Reasoning. The AI proposes; a human approves every write.</text>

  <!-- Row 1 -->
  <g>
    <rect class="card" x="40" y="150" width="222" height="92" rx="14"/>
    <rect x="40" y="164" width="4" height="64" rx="2" fill="#18E0D6"/><circle cx="70" cy="190" r="6" fill="#18E0D6"/>
    <text class="t name" x="46" y="196">Ollama <tspan fill="#18E0D6" font-size="12">★</tspan></text><text class="t ven" x="46" y="218">Local · private · free</text>

    <rect class="card" x="284" y="150" width="222" height="92" rx="14"/>
    <rect x="284" y="164" width="4" height="64" rx="2" fill="#10A37F"/><circle cx="314" cy="190" r="6" fill="#10A37F"/>
    <text class="t name" x="290" y="196">GPT</text><text class="t ven" x="290" y="218">OpenAI · vision</text>

    <rect class="card" x="528" y="150" width="222" height="92" rx="14"/>
    <rect x="528" y="164" width="4" height="64" rx="2" fill="#D97757"/><circle cx="558" cy="190" r="6" fill="#D97757"/>
    <text class="t name" x="534" y="196">Claude</text><text class="t ven" x="534" y="218">Anthropic · long-context</text>

    <rect class="card" x="772" y="150" width="222" height="92" rx="14"/>
    <rect x="772" y="164" width="4" height="64" rx="2" fill="#4285F4"/><circle cx="802" cy="190" r="6" fill="#4285F4"/>
    <text class="t name" x="778" y="196">Gemini</text><text class="t ven" x="778" y="218">Google · multimodal</text>

    <rect class="card" x="1016" y="150" width="222" height="92" rx="14"/>
    <rect x="1016" y="164" width="4" height="64" rx="2" fill="#C7D0DC"/><circle cx="1046" cy="190" r="6" fill="#C7D0DC"/>
    <text class="t name" x="1022" y="196">Grok</text><text class="t ven" x="1022" y="218">xAI · conversational</text>
  </g>

  <!-- Row 2 -->
  <g>
    <rect class="card" x="40" y="262" width="222" height="92" rx="14"/>
    <rect x="40" y="276" width="4" height="64" rx="2" fill="#8B7CFF"/><circle cx="70" cy="302" r="6" fill="#8B7CFF"/>
    <text class="t name" x="46" y="308">Blackbox</text><text class="t ven" x="46" y="330">Blackbox AI · coding</text>

    <rect class="card" x="284" y="262" width="222" height="92" rx="14"/>
    <rect x="284" y="276" width="4" height="64" rx="2" fill="#A78BFA"/><circle cx="314" cy="302" r="6" fill="#A78BFA"/>
    <text class="t name" x="290" y="308">Cursor AI</text><text class="t ven" x="290" y="330">Cursor gateway · coding</text>

    <rect class="card" x="528" y="262" width="222" height="92" rx="14"/>
    <rect x="528" y="276" width="4" height="64" rx="2" fill="#4D6BFE"/><circle cx="558" cy="302" r="6" fill="#4D6BFE"/>
    <text class="t name" x="534" y="308">DeepSeek</text><text class="t ven" x="534" y="330">DeepSeek · reasoning</text>

    <rect class="card" x="772" y="262" width="222" height="92" rx="14"/>
    <rect x="772" y="276" width="4" height="64" rx="2" fill="#F59E0B"/><circle cx="802" cy="302" r="6" fill="#F59E0B"/>
    <text class="t name" x="778" y="308">Qwen</text><text class="t ven" x="778" y="330">Alibaba · chat + coding</text>

    <rect class="card" x="1016" y="262" width="222" height="92" rx="14"/>
    <rect x="1016" y="276" width="4" height="64" rx="2" fill="#34D399"/><circle cx="1046" cy="302" r="6" fill="#34D399"/>
    <text class="t name" x="1022" y="308">OpenRouter <tspan fill="#34D399">×6</tspan></text><text class="t ven" x="1022" y="330">six routed agents · any model</text>
  </g>

  <!-- model slots note -->
  <g>
    <rect class="card" x="40" y="378" width="1198" height="86" rx="14"/>
    <text class="t" x="64" y="416" font-size="16" font-weight="700" fill="#E6EAF1">2 model slots per direct provider</text>
    <text class="t" x="64" y="440" font-size="13" fill="#8B96A7">GPT 1/2 · Gemini 1/2 · Cursor 1/2 … one provider can field two models. Each direct provider + the six OpenRouter agents carry their own key, default model, and honest status.</text>
  </g>

  <text class="t" x="40" y="506" font-size="13" fill="#5C6675">Honest status: a provider is “online” only after a successful Test Connection — never faked. Keys stay server-side; a per-workspace policy can keep everything local-only.</text>
</svg>
