<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" role="img" aria-label="AllHaven Command Center — local-first AI command center">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0C10"/>
      <stop offset="1" stop-color="#0E141C"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#18E0D6"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#172029"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .t { font-family: 'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="300" fill="url(#bg)"/>
  <rect width="1280" height="300" fill="url(#dots)"/>
  <circle cx="1090" cy="150" r="260" fill="#18E0D6" opacity="0.06"/>

  <!-- Shield mark -->
  <g transform="translate(110,150)" filter="url(#glow)">
    <path d="M0,-64 L58,-40 L58,8 C58,46 32,72 0,84 C-32,72 -58,46 -58,8 L-58,-40 Z"
          fill="#0F151D" stroke="url(#teal)" stroke-width="3.5"/>
    <path d="M-24,2 L-7,21 L28,-22" fill="none" stroke="url(#teal)" stroke-width="7"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text class="t" x="208" y="138" font-size="62" font-weight="700" fill="#E6EAF1">All<tspan fill="#18E0D6">Haven</tspan></text>
  <text class="t" x="210" y="180" font-size="30" font-weight="600" fill="#C7D0DC" letter-spacing="0.5">Command Center</text>
  <rect x="212" y="198" width="132" height="4" rx="2" fill="url(#teal)"/>
  <text class="t" x="212" y="236" font-size="21" fill="#8B96A7">Local-first AI command center — the AI proposes, a human approves.</text>
  <text class="t" x="212" y="266" font-size="16" fill="#5C6675" letter-spacing="0.6">FastAPI · Next.js 14 · PostgreSQL · 15 AI providers · Human-in-the-loop</text>
</svg>
