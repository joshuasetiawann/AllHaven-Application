# AllHaven — production stack: PostgreSQL + backend + frontend + Caddy (auto-HTTPS).
# Single domain: Caddy serves the frontend and proxies /api/* to the backend, so
# the frontend and API share an origin (no CORS needed).
#
# Quick start:
#   1) cp .env.prod.example .env.prod   and fill in strong secrets + your DOMAIN
#   2) docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#   3) point your domain's DNS A record at the server, then open https://<DOMAIN>

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - allhaven_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY}
      # Same-origin via Caddy, so list your domain explicitly (no wildcard in prod).
      BACKEND_CORS_ORIGINS: https://${DOMAIN}
      # Optional provider/integration defaults (the web UI can also set these):
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
    volumes:
      - allhaven_drive:/data/drive

  frontend:
    build:
      context: ./frontend
      args:
        # Same-origin API path served by Caddy.
        NEXT_PUBLIC_API_BASE_URL: https://${DOMAIN}/api/v1
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  allhaven_pgdata:
  allhaven_drive:
  caddy_data:
  caddy_config:
